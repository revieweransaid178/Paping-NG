name: Build and Release Binaries

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os_name: Windows (x64)
            out_name: paping-windows-amd64.exe
            cmake_flags: "-G \"Visual Studio 17 2022\" -A x64 -DCMAKE_MSVC_RUNTIME_LIBRARY=MultiThreaded"
          - os: ubuntu-latest
            os_name: Linux (x64)
            out_name: paping-linux-amd64
            cmake_flags: ""
          - os: macos-latest
            os_name: macOS (Apple Silicon / M1)
            out_name: paping-macos-arm64
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=arm64"
          - os: macos-latest
            os_name: macOS (Intel)
            out_name: paping-macos-amd64
            cmake_flags: "-DCMAKE_OSX_ARCHITECTURES=x86_64"

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_flags }}

    - name: Build
      run: cmake --build build --config Release

    - name: Find and Rename binary (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: Copy-Item "build/Release/paping.exe" -Destination ${{ matrix.out_name }}

    - name: Rename binary (Linux / macOS)
      if: runner.os != 'Windows'
      run: mv build/paping ${{ matrix.out_name }}

    - name: Upload artifact (for testing)
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.out_name }}
        path: ${{ matrix.out_name }}
        retention-days: 7

    - name: Upload Binary to Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.out_name }}